<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E3F2FD"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Car body -->
  <g transform="translate(256,240)">
    <!-- Car shape -->
    <path d="M-120,30 L-100,-20 L-60,-60 L60,-60 L100,-20 L120,30 L120,60 L-120,60 Z" fill="url(#car)" opacity="0.95"/>
    <!-- Windows -->
    <path d="M-55,-50 L-85,-15 L-10,-15 L-10,-50 Z" fill="#1565C0" opacity="0.6"/>
    <path d="M10,-50 L10,-15 L85,-15 L55,-50 Z" fill="#1565C0" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="-70" cy="60" r="22" fill="#263238"/>
    <circle cx="-70" cy="60" r="12" fill="#78909C"/>
    <circle cx="70" cy="60" r="22" fill="#263238"/>
    <circle cx="70" cy="60" r="12" fill="#78909C"/>
    <!-- Headlights -->
    <rect x="-115" y="10" width="20" height="15" rx="4" fill="#FFF9C4" opacity="0.9"/>
    <rect x="95" y="10" width="20" height="15" rx="4" fill="#FFCDD2" opacity="0.9"/>
  </g>
  <!-- People dots -->
  <circle cx="200" cy="160" r="18" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="256" cy="145" r="18" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="312" cy="160" r="18" fill="#FFFFFF" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="218" y1="160" x2="238" y2="152" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <line x1="274" y1="152" x2="294" y2="160" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <!-- CNU text -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="8">CNU</text>
  <!-- Subtitle -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="32" fill="#BBDEFB">CARPOOL</text>
</svg>
