<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Car body -->
    <path d="M-160,20 L-130,-50 L-80,-110 L80,-110 L130,-50 L160,20 L160,70 L-160,70 Z" fill="#FFFFFF"/>
    <!-- Roof -->
    <path d="M-70,-100 L-115,-40 L115,-40 L70,-100 Z" fill="#BBDEFB"/>
    <!-- Window divider -->
    <line x1="0" y1="-100" x2="0" y2="-40" stroke="#1565C0" stroke-width="6"/>
    <!-- Left window -->
    <path d="M-65,-95 L-108,-45 L-5,-45 L-5,-95 Z" fill="#1565C0" opacity="0.4"/>
    <!-- Right window -->
    <path d="M65,-95 L108,-45 L5,-45 L5,-95 Z" fill="#1565C0" opacity="0.4"/>
    <!-- Wheels -->
    <circle cx="-95" cy="70" r="35" fill="#263238"/>
    <circle cx="-95" cy="70" r="20" fill="#607D8B"/>
    <circle cx="-95" cy="70" r="8" fill="#263238"/>
    <circle cx="95" cy="70" r="35" fill="#263238"/>
    <circle cx="95" cy="70" r="20" fill="#607D8B"/>
    <circle cx="95" cy="70" r="8" fill="#263238"/>
    <!-- Headlights -->
    <rect x="-155" y="-10" width="28" height="22" rx="6" fill="#FFF9C4"/>
    <rect x="127" y="-10" width="28" height="22" rx="6" fill="#FFCDD2"/>
    <!-- Bumper line -->
    <rect x="-100" y="40" width="200" height="6" rx="3" fill="#E3F2FD"/>
  </g>
</svg>
